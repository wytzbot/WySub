<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WyCode AI</title>
<style>
  :root{--green:#CCFF00;--black:#000}
  body{margin:0;font-family:Inter;background:linear-gradient(120deg,#000,#001100,#CCFF00);background-size:300% 300%;animation:bgMove 15s ease infinite;color:#fff}
  @keyframes bgMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;text-align:center;padding:20px}
  .welcome h1{font-size:40px;background:linear-gradient(90deg,#fff,var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .rotating{font-size:18px;height:30px;color:#aaa}
  .btn{background:var(--green);color:#000;padding:14px 40px;border-radius:50px;border:none;font-weight:bold;font-size:16px;margin-top:20px}
  .chat{display:none;flex-direction:column;height:100vh}
  .header{display:flex;justify-content:space-between;padding:12px;background:#111}
  .input-bar{display:flex;padding:10px;background:#111;position:fixed;bottom:0;width:100%}
  .input-bar textarea{flex:1;background:#222;border:none;color:#fff;border-radius:12px;padding:12px}
  .send{background:var(--green);border:none;border-radius:12px;padding:0 20px;margin-left:8px;color:#000;font-weight:bold}
  .msg{padding:12px;margin:8px;border-radius:12px;max-width:80%}
  .user{align-self:flex-end;background:var(--green);color:#000}
  .ai{align-self:flex-start;background:#1a1a1a}
  .codeblock{background:#1e1e1e;border-radius:8px;margin:10px 0;overflow:hidden}
  .codeheader{display:flex;justify-content:space-between;padding:8px;background:#2a2a2a;font-size:12px}
  .codeheader button{background:none;border:1px solid var(--green);color:var(--green);border-radius:6px;padding:4px 8px}
  pre{padding:12px;overflow-x:auto}
</style>
</head>
<body>

<!-- WELCOME PAGE -->
<div class="welcome" id="welcome">
  <h1>WyCode AI</h1>
  <div class="rotating" id="rotatingText">Your Coding Partner</div>
  <button class="btn" onclick="startChat()">Start Coding</button>
</div>

<!-- CHAT PAGE -->
<div class="chat" id="chat">
  <div class="header">
    <div id="greet">Welcome back</div>
    <button onclick="newChat()">+ New</button>
  </div>
  <div id="messages" style="flex:1;overflow-y:auto;padding:10px 10px 80px 10px"></div>
  <div class="input-bar">
    <textarea id="userInput" placeholder="Ask WyCode anything..."></textarea>
    <button class="send" onclick="sendMsg()">Send</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDTAqb0waoaoSDrwOa2UXRjwl8wmSyXUs0",
  authDomain: "my-wyticle-id.firebaseapp.com",
  projectId: "my-wyticle-id",
  storageBucket: "my-wyticle-id.firebasestorage.app",
  messagingSenderId: "634169882815",
  appId: "1:634169882815:web:486d39a13ce2f855c0ae0a"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const ROTATING_WELCOME = ["Your Coding Partner","Generate, Debug, Deploy","Powered by Gemini 2.5 Flash"];
const ROTATING_GREET = ["Welcome back","Where should we start today","Ready to build something great?"];
let i=0; setInterval(()=>{document.getElementById('rotatingText').innerText=ROTATING_WELCOME[i++%3]},3000);
setInterval(()=>{document.getElementById('greet').innerText=ROTATING_GREET[i++%3]},5000);

function startChat(){document.getElementById('welcome').style.display='none';document.getElementById('chat').style.display='flex'}

function createCodeBlock(code,lang){
  const box=document.createElement('div');box.className='codeblock';
  box.innerHTML=`<div class="codeheader"><span>${lang}</span><div><button onclick="copyCode(this)">Copy</button><button onclick="downloadCode('${btoa(code)}','${lang}')">Download</button></div></div><pre><code>${code}</code></pre>`;
  return box;
}
window.copyCode=(btn)=>{navigator.clipboard.writeText(btn.closest('.codeblock').querySelector('code').innerText);btn.innerText='Copied!';setTimeout(()=>btn.innerText='Copy',1500)}
window.downloadCode=(b64,lang)=>{const a=document.createElement('a');a.href='data:text/plain;base64,'+b64;a.download=`wycode-${Date.now()}.${lang}`;a.click()}

async function sendMsg(){
  const input=document.getElementById('userInput');const text=input.value;if(!text)return;
  addMsg(text,'user');input.value='';
  const res=await fetch('/api/chat',{method:'POST',body:JSON.stringify({prompt:text})});
  const data=await res.json();
  const aiDiv=addMsg(data.reply,'ai');
  // detect code blocks
  if(data.reply.includes('```')){
    data.reply.split('```').forEach((part,idx)=>{
      if(idx%2===1){const [lang,...code]=part.split('\n');aiDiv.appendChild(createCodeBlock(code.join('\n'),lang))}
    })
  }
}
function addMsg(text,type){
  const div=document.createElement('div');div.className='msg '+type;div.innerText=text;
  if(type==='user'){div.innerHTML+=` <span onclick="editMsg(this)">Edit</span> <span onclick="this.parentNode.remove()">Del</span>`}
  if(type==='ai'){div.innerHTML+=` <span onclick="regenerate()">Redo</span> <span onclick="this.parentNode.remove()">Del</span>`}
  document.getElementById('messages').appendChild(div);return div
}
window.editMsg=(el)=>{const newText=prompt('Edit:',el.parentNode.innerText);if(newText)el.parentNode.firstChild.nodeValue=newText}
window.regenerate=()=>alert('Regenerating...')
window.newChat=()=>{document.getElementById('messages').innerHTML=''}
</script>
</body>
  </html>
